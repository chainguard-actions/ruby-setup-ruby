name: Test rubygems and bundler inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          ruby-version: '3.2'
          rubygems: 'latest'
          bundler: 'latest'
      - name: Assert ruby-prefix output is set
        env:
          ACTUAL: ${{ steps.action.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert ruby and bundler are available
        run: |
          ruby --version
          bundle --version
          echo "PASS: ruby and bundler are available"
