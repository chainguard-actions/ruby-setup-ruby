name: Test working-directory and cache-version inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create working directory with .ruby-version
        run: |
          mkdir -p /tmp/ruby-test-dir
          echo "3.2" > /tmp/ruby-test-dir/.ruby-version
      - id: action
        uses: .
        with:
          ruby-version: '3.2'
          working-directory: '/tmp/ruby-test-dir'
          cache-version: 'v1'
          bundler: 'none'
          rubygems: 'default'
      - name: Assert ruby-prefix output is set
        env:
          RUBY_PREFIX: ${{ steps.action.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $RUBY_PREFIX"
          if [ -z "$RUBY_PREFIX" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert ruby is available
        run: |
          ruby --version
          echo "PASS"
