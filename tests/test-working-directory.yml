name: Test working-directory and cache-version inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create working directory with .ruby-version file
        run: |
          mkdir -p /tmp/ruby-test-workdir
          echo "3.2" > /tmp/ruby-test-workdir/.ruby-version
      - id: action
        uses: .
        with:
          working-directory: '/tmp/ruby-test-workdir'
          cache-version: 'test-v1'
          bundler: 'none'
      - name: Assert ruby-prefix output is set
        env:
          ACTUAL: ${{ steps.action.outputs.ruby-prefix }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: ruby-prefix output was empty"
            exit 1
          fi
          echo "PASS: ruby-prefix=$ACTUAL"
      - name: Assert ruby is on PATH
        run: |
          ruby --version
          echo "PASS: ruby is available"
