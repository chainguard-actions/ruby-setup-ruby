name: Test rubygems and cache-version inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-ruby
        uses: .
        with:
          ruby-version: '3.2'
          rubygems: 'default'
          cache-version: 'v1'
      - name: Assert ruby-prefix output is set
        env:
          RUBY_PREFIX: ${{ steps.setup-ruby.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $RUBY_PREFIX"
          if [ -z "$RUBY_PREFIX" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert gem is available
        run: |
          gem --version
          if [ $? -ne 0 ]; then
            echo "FAIL: gem not found in PATH"
            exit 1
          fi
          echo "PASS"
