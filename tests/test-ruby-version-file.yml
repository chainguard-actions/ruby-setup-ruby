name: Test Ruby setup from .ruby-version file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create .ruby-version file
        run: |
          echo "3.2" > .ruby-version
          cat .ruby-version
      - id: setup-ruby
        uses: .
        with:
          bundler-cache: 'false'
      - name: Assert ruby-prefix output is set
        env:
          ACTUAL: ${{ steps.setup-ruby.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS: ruby-prefix is set to $ACTUAL"
      - name: Assert ruby version matches .ruby-version file
        run: |
          echo "Ruby version:"
          ruby --version
          if ! ruby --version | grep -q "3\.2"; then
            echo "FAIL: expected Ruby 3.2.x as specified in .ruby-version"
            exit 1
          fi
          echo "PASS: Ruby version matches .ruby-version file"
