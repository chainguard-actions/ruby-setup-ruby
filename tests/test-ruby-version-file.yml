name: Test Ruby setup from .ruby-version file
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create .ruby-version file in working directory
        run: |
          mkdir -p /tmp/ruby-test-dir
          echo "3.2" > /tmp/ruby-test-dir/.ruby-version
          cat /tmp/ruby-test-dir/.ruby-version
      - id: setup-ruby
        uses: .
        with:
          working-directory: /tmp/ruby-test-dir
          bundler: 'none'
          bundler-cache: 'false'
      - name: Assert ruby-prefix output is set
        env:
          RUBY_PREFIX: ${{ steps.setup-ruby.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $RUBY_PREFIX"
          if [ -z "$RUBY_PREFIX" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS: ruby-prefix is set"
      - name: Assert ruby version matches .ruby-version file
        run: |
          ruby --version
          ruby --version | grep -E "ruby 3\.2\." || { echo "FAIL: expected Ruby 3.2.x from .ruby-version"; exit 1; }
          echo "PASS"
