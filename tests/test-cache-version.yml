name: Test cache-version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          ruby-version: '3.2'
          cache-version: 'v1'
      - name: Assert ruby-prefix output is set
        env:
          ACTUAL: ${{ steps.action.outputs.ruby-prefix }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: ruby-prefix output was empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert ruby is available
        run: |
          ruby --version
          echo "PASS"
