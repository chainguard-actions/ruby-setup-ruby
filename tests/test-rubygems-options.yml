name: Test RubyGems and cache options
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          ruby-version: '3.2'
          rubygems: 'default'
          bundler: 'none'
          cache-version: 'v1'
          self-hosted: 'false'
      - name: Assert ruby-prefix output is set
        env:
          RUBY_PREFIX: ${{ steps.action.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $RUBY_PREFIX"
          if [ -z "$RUBY_PREFIX" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert ruby is on PATH
        run: |
          ruby --version
          echo "PASS: ruby is available"
