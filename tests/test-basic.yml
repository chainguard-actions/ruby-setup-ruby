name: Test basic Ruby setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-ruby
        uses: .
        with:
          ruby-version: '3.2'
          bundler-cache: 'false'
      - name: Assert ruby-prefix output is set
        env:
          RUBY_PREFIX: ${{ steps.setup-ruby.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $RUBY_PREFIX"
          if [ -z "$RUBY_PREFIX" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS: ruby-prefix is set to $RUBY_PREFIX"
      - name: Assert ruby binary is available
        run: |
          which ruby
          ruby --version
          echo "Ruby version:"
          ruby --version | grep -E "ruby 3\." || { echo "FAIL: expected Ruby 3.x"; exit 1; }
          echo "PASS"
      - name: Assert gem is available
        run: |
          which gem
          gem --version
          echo "PASS: gem is available"
