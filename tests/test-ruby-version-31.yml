name: Test Ruby 3.1 setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-ruby
        uses: .
        with:
          ruby-version: '3.1'
          bundler-cache: 'false'
      - name: Assert ruby-prefix output is set
        env:
          ACTUAL: ${{ steps.setup-ruby.outputs.ruby-prefix }}
        run: |
          echo "ruby-prefix: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: ruby-prefix output is empty"
            exit 1
          fi
          echo "PASS: ruby-prefix is set to $ACTUAL"
      - name: Assert ruby 3.1 is on PATH
        run: |
          echo "Ruby version:"
          ruby --version
          if ! ruby --version | grep -q "3\.1"; then
            echo "FAIL: expected Ruby 3.1.x"
            exit 1
          fi
          echo "PASS: Ruby 3.1 is installed"
      - name: Assert bundler is available
        run: |
          echo "Bundler version:"
          bundle --version
          if ! bundle --version > /dev/null 2>&1; then
            echo "FAIL: bundler not available"
            exit 1
          fi
          echo "PASS: bundler is available"
